name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'Homeworks/06 Настройка CI/**'
  workflow_dispatch:

jobs:  
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        
      - name: Build and run tests
        run: |
          docker build \
            --file "Homeworks/06 Настройка CI/src/Dockerfile" \
            --target test \
            --tag promocode-factory-api-test-image \
            "Homeworks/06 Настройка CI/src"

      - name: Convert repository name to lowercase
        run: |
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$LOWERCASE_REPO" >> $GITHUB_ENV

      - name: Docker registry login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}   
          password: ${{ secrets.GITHUB_TOKEN }}    

      - name: Build and push 
        uses: docker/build-push-action@v5
        with:
          context: "Homeworks/06 Настройка CI/src"
          file: "Homeworks/06 Настройка CI/src/Dockerfile"
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest